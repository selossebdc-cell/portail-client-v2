<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto 04 Post-excursion — fiche remplissable</title>
  <style>
    :root { --bg:#0f1115; --card:#181c24; --text:#e9edf5; --muted:#a8b0bf; --line:#2a3140; --accent:#7cc4ff; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif; background:var(--bg); color:var(--text); padding:24px; }
    .wrap { max-width:950px; margin:0 auto; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:12px; }
    h1 { font-size:1.45rem; margin-bottom:6px; } h2 { font-size:1.08rem; margin-bottom:6px; color:var(--accent); }
    p,label { color:var(--muted); font-size:0.93rem; } ul { margin-left:18px; } li { margin:6px 0; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:10px; }
    input[type=text], textarea, select { width:100%; background:#11151d; color:var(--text); border:1px solid var(--line); border-radius:8px; padding:9px; margin-top:5px; }
    textarea { min-height:82px; } .check label { display:block; color:var(--text); margin:6px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Auto 04 — Post-excursion feedback + synthèse</h1>
      <p>But: transformer chaque excursion en amélioration continue actionnable.</p>
    </div>
    <div class="card">
      <h2>Timing de collecte (propositions)</h2>
      <div class="check">
        <label><input type="checkbox"> Option A: envoi client à T+3h, relance T+24h.</label>
        <label><input type="checkbox"> Option B: envoi client le lendemain matin.</label>
        <label><input type="checkbox"> Option C: collecte guide immédiate fin de journée.</label>
      </div>
      <label>Timing final validé</label>
      <input type="text" placeholder="Séquence retenue">
    </div>
    <div class="card">
      <h2>Questionnaires (propositions)</h2>
      <div class="grid">
        <div>
          <label>Client (court)</label>
          <textarea placeholder="- Note globale /10&#10;- Ce qui a plu&#10;- Ce qui pourrait être amélioré"></textarea>
        </div>
        <div>
          <label>Guide (opérationnel)</label>
          <textarea placeholder="- Nb participants réel&#10;- Incident(s)&#10;- Point d'amélioration"></textarea>
        </div>
      </div>
    </div>
    <div class="card">
      <h2>Synthèse et tâches auto</h2>
      <label>Règle de création de tâche (propositions)</label>
      <textarea placeholder="Ex: si note < 8 ou incident mentionné => créer tâche + owner + échéance"></textarea>
      <div class="grid">
        <div>
          <label>Owner par défaut</label>
          <input type="text" placeholder="ex: Taina / assistante">
        </div>
        <div>
          <label>Délai standard de traitement</label>
          <input type="text" placeholder="ex: 72h">
        </div>
      </div>
    </div>
    <div class="card">
      <h2>Checklist installation</h2>
      <div class="check">
        <label><input type="checkbox"> Valider les 2 formulaires.</label>
        <label><input type="checkbox"> Tester sur 3 excursions passées.</label>
        <label><input type="checkbox"> Vérifier attribution correcte des tâches.</label>
        <label><input type="checkbox"> Définir rituel revue hebdo (30 min).</label>
      </div>
      <label>Décision finale + plan de mise en route</label>
      <textarea placeholder="- Décision / Action / Date / Responsable"></textarea>
    </div>
  </div>
</body>
</html>
