<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS — Réinitialiser le mot de passe</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1 class="login-card__title" style="color:var(--terracotta)">CS</h1>
      <p class="login-card__subtitle">Nouveau mot de passe</p>

      <!-- Loading -->
      <div id="loading" style="text-align:center;padding:40px 0">
        <span class="spinner"></span>
        <p style="color:var(--text-muted);font-size:var(--font-size-sm);margin-top:12px">Vérification du lien...</p>
      </div>

      <!-- Formulaire nouveau mot de passe -->
      <form id="reset-form" style="display:none">
        <div class="form-group">
          <label for="new-password">Nouveau mot de passe</label>
          <input type="password" id="new-password" class="input" placeholder="Minimum 6 caractères" required autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirmer le mot de passe</label>
          <input type="password" id="confirm-password" class="input" placeholder="Retape ton mot de passe" required autocomplete="new-password">
        </div>
        <div id="reset-error" class="form-error"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:var(--space-md)">Changer le mot de passe</button>
      </form>

      <!-- Succès -->
      <div id="success-message" style="display:none;text-align:center;padding:20px 0">
        <div style="font-size:2rem;margin-bottom:12px">✅</div>
        <p style="font-size:var(--font-size-sm);color:#4ade80;font-weight:600;margin-bottom:8px">Mot de passe changé avec succès !</p>
        <p style="font-size:var(--font-size-xs);color:var(--text-muted)">Redirection vers l'espace client...</p>
      </div>

      <!-- Erreur lien invalide -->
      <div id="error-message" style="display:none;text-align:center;padding:20px 0">
        <div style="font-size:2rem;margin-bottom:12px">⚠️</div>
        <p style="font-size:var(--font-size-sm);color:#f87171;font-weight:600;margin-bottom:8px">Lien invalide ou expiré</p>
        <p style="font-size:var(--font-size-xs);color:var(--text-muted);margin-bottom:16px">Demande un nouveau lien depuis la page de connexion.</p>
        <a href="index.html" class="btn btn-primary" style="text-decoration:none;display:inline-flex;justify-content:center">Retour à la connexion</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    (async function() {
      var loadingEl = document.getElementById('loading');
      var formEl = document.getElementById('reset-form');
      var successEl = document.getElementById('success-message');
      var errorMsgEl = document.getElementById('error-message');
      var resetErrorEl = document.getElementById('reset-error');

      var recoveryReady = false;

      // Écouter l'événement PASSWORD_RECOVERY de Supabase
      db.auth.onAuthStateChange(function(event, session) {
        if (event === 'PASSWORD_RECOVERY') {
          recoveryReady = true;
          loadingEl.style.display = 'none';
          formEl.style.display = 'block';
        }
      });

      // Timeout : si après 5s pas de PASSWORD_RECOVERY, lien invalide
      setTimeout(function() {
        if (!recoveryReady) {
          loadingEl.style.display = 'none';
          errorMsgEl.style.display = 'block';
        }
      }, 5000);

      // Soumission du formulaire
      formEl.addEventListener('submit', async function(e) {
        e.preventDefault();
        resetErrorEl.classList.remove('visible');

        var newPw = document.getElementById('new-password').value;
        var confirmPw = document.getElementById('confirm-password').value;

        if (newPw.length < 6) {
          resetErrorEl.textContent = 'Le mot de passe doit faire au moins 6 caractères';
          resetErrorEl.classList.add('visible');
          return;
        }
        if (newPw !== confirmPw) {
          resetErrorEl.textContent = 'Les mots de passe ne correspondent pas';
          resetErrorEl.classList.add('visible');
          return;
        }

        var btn = formEl.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Changement...';

        try {
          var { error } = await db.auth.updateUser({ password: newPw });
          if (error) throw error;

          formEl.style.display = 'none';
          successEl.style.display = 'block';
          setTimeout(function() { window.location.href = 'app.html'; }, 2000);
        } catch (err) {
          resetErrorEl.textContent = 'Erreur : ' + (err.message || 'impossible de changer le mot de passe');
          resetErrorEl.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Changer le mot de passe';
        }
      });
    })();
  </script>
</body>
</html>
